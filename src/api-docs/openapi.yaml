          schema:
            type: string
      responses:
        '200':
          description: Trash emptied

  /trash/{id}:
    delete:
      tags: [Trash]
      summary: Permanently delete a note from trash
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Note permanently deleted

  # ==================
  # Workspaces Endpoints
  # ==================
  /workspaces:
    get:
      tags: [Workspaces]
      summary: List all workspaces
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
      responses:
        '200':
          description: List of workspaces
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  workspaces:
                    type: array
                    items:
                      $ref: '#/components/schemas/Workspace'
    post:
      tags: [Workspaces]
      summary: Create a new workspace
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  example: "New Workspace"
      responses:
        '201':
          description: Workspace created

  /workspaces/{name}:
    patch:
      tags: [Workspaces]
      summary: Rename a workspace
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                new_name:
                  type: string
      responses:
        '200':
          description: Workspace renamed
    delete:
      tags: [Workspaces]
      summary: Delete a workspace
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Workspace deleted

  # ==================
  # Tags Endpoints
  # ==================
  /tags:
    get:
      tags: [Tags]
      summary: List all unique tags
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: workspace
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of tags
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  tags:
                    type: array
                    items:
                      type: string

  /tags/{tag}:
    patch:
      tags: [Tags]
      summary: Rename a tag across all notes
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: tag
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [new_name]
              properties:
                new_name:
                  type: string
                workspace:
                  type: string
                  description: Only rename within this workspace
      responses:
        '200':
          description: Tag renamed
    delete:
      tags: [Tags]
      summary: Delete a tag from all notes
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: tag
          in: path
          required: true
          schema:
            type: string
        - name: workspace
          in: query
          schema:
            type: string
          description: Only delete within this workspace
      responses:
        '200':
          description: Tag deleted

  # ==================
  # Settings Endpoints
  # ==================
  /settings:
    get:
      tags: [Settings]
      summary: Get setting values
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: keys
          in: query
          required: false
          description: Optional comma-separated list of setting keys to return
          schema:
            type: string
            example: language,note_age_filter_days
      responses:
        '200':
          description: Setting values
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  settings:
                    type: object
                    additionalProperties:
                      type: string

  /settings/{key}:
    get:
      tags: [Settings]
      summary: Get a setting value
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: key
          in: path
          required: true
          schema:
            type: string
          description: Setting key (user-level or global)
      responses:
        '200':
          description: Setting value
    put:
      tags: [Settings]
      summary: Set a setting value
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: key
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                value:
                  type: string
      responses:
        '200':
          description: Setting updated

  # ==================
  # Backup Endpoints
  # ==================
  /backups:
    get:
      tags: [Backups]
      summary: List all backups (requires admin credentials and X-User-ID)
      description: |
        Lists all backups for the specified user. Requires admin credentials.
        The X-User-ID header specifies which user's backups to list.
      parameters:
        - name: X-User-ID
          in: header
          required: true
          schema:
            type: integer
          description: ID of the user whose backups to list
          example: 9
      responses:
        '200':
          description: List of backups
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  backups:
                    type: array
                    items:
                      $ref: '#/components/schemas/Backup'
                  total:
                    type: integer
    post:
      tags: [Backups]
      summary: Create a new backup (requires admin credentials and X-User-ID)
      description: |
        Creates a backup for the specified user. Requires admin credentials.
        The X-User-ID header specifies which user's data to backup.
      parameters:
        - name: X-User-ID
          in: header
          required: true
          schema:
            type: integer
          description: ID of the user to backup
          example: 9
      responses:
        '201':
          description: Backup created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  filename:
                    type: string
                  size:
                    type: integer
                  download_url:
                    type: string

  /backups/upload:
    post:
      tags: [Backups]
      summary: Upload a backup ZIP to the server
      description: |
        Uploads a local backup ZIP file to the server's backup directory.
        The file is stored with a standard timestamped name.
        Use the returned `filename` with `POST /backups/{filename}/restore` to restore it.
      parameters:
        - name: X-User-ID
          in: header
          required: true
          schema:
            type: integer
          description: ID of the user who owns this backup
          example: 9
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: The backup ZIP file to upload
      responses:
        '201':
          description: Backup uploaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  filename:
                    type: string
                    example: "poznote_backup_2025-01-05_12-00-00.zip"
                  size:
                    type: integer
                  size_mb:
                    type: number
                  restore_url:
                    type: string
                    example: "/api/v1/backups/poznote_backup_2025-01-05_12-00-00.zip/restore"
                  download_url:
                    type: string
                    example: "/api/v1/backups/poznote_backup_2025-01-05_12-00-00.zip"
        '400':
          description: No valid file uploaded or not a ZIP archive
        '500':
          description: Failed to save the uploaded file

  /backups/{filename}:
    get:
      tags: [Backups]
      summary: Download a backup (requires admin credentials and X-User-ID)
      description: |
        Downloads a backup file. Requires admin credentials.
        The X-User-ID header specifies which user's backup to download.
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string
          example: poznote_backup_2026-02-02_15-30-00.zip
        - name: X-User-ID
          in: header
          required: true
          schema:
            type: integer
          description: ID of the user who owns this backup
          example: 9
      responses:
        '200':
          description: Backup file download
          content:
            application/zip:
              schema:
                type: string
                format: binary
    delete:
      tags: [Backups]
      summary: Delete a backup (requires admin credentials and X-User-ID)
      description: |
        Deletes a backup file. Requires admin credentials.
        The X-User-ID header specifies which user's backup to delete.
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string
          example: poznote_backup_2026-02-02_15-30-00.zip
        - name: X-User-ID
          in: header
          required: true
          schema:
            type: integer
          description: ID of the user who owns this backup
          example: 9
      responses:
        '200':
          description: Backup deleted

  /backups/{filename}/restore:
    post:
      tags: [Backups]
      summary: Restore a backup
      description: Restore a backup file. This will replace all current user data (database, notes, and attachments) with the data from the backup.
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string
            example: poznote_backup_2026-02-02_15-30-00.zip
        - $ref: '#/components/parameters/UserIdHeader'
      responses:
        '200':
          description: Backup restored successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  details:
                    type: object
        '400':
          description: Invalid backup filename format
        '404':
          description: Backup file not found
        '500':
          description: Failed to restore backup

  # ==================
  # System Endpoints
  # ==================
  /system/version:
    get:
      tags: [System]
      summary: Get version information
      responses:
        '200':
          description: Version info
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  current_version:
                    type: string
                    example: "2.0.2"
                  latest_version:
                    type: string
                    example: "2.0.2"
                  is_up_to_date:
                    type: boolean

  /system/updates:
    get:
      tags: [System]
      summary: Check for updates
      responses:
        '200':
          description: Update check result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  has_updates:
                    type: boolean
                  current_version:
                    type: string
                  remote_version:
                    type: string

  /system/i18n:
    get:
      tags: [System]
      summary: Get translations
      parameters:
        - name: lang
          in: query
          schema:
            type: string
            example: fr
          description: Language code (defaults to the configured language)
      responses:
        '200':
          description: Translation strings
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  lang:
                    type: string
                    example: "en"
                  strings:
                    type: object
                    additionalProperties:
                      type: string

  # ==================
  # Git Sync Endpoints
  # ==================
  # The legacy /github-sync/* prefix is an alias of /git-sync/* (status, test, push, pull)
  /git-sync/status:
    get:
      tags: [Git Sync]
      summary: Get Git sync configuration and status
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
      responses:
        '200':
          description: Sync status

  /git-sync/test:
    post:
      tags: [Git Sync]
      summary: Test the Git connection and credentials
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
      responses:
        '200':
          description: Connection test result

  /git-sync/push:
    post:
      tags: [Git Sync]
      summary: Push all notes to the configured Git repository (all workspaces)
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                async:
                  type: boolean
                  description: Run in background (poll /git-sync/progress)
      responses:
        '200':
          description: Push result
        '403':
          description: Git sync is not enabled

  /git-sync/pull:
    post:
      tags: [Git Sync]
      summary: Pull all notes from the configured Git repository (all workspaces)
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                async:
                  type: boolean
                  description: Run in background (poll /git-sync/progress)
      responses:
        '200':
          description: Pull result
        '403':
          description: Git sync is not enabled

  /git-sync/progress:
    get:
      tags: [Git Sync]
      summary: Get the current sync progress
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
      responses:
        '200':
          description: Sync progress

  /git-sync/config:
    put:
      tags: [Git Sync]
      summary: Save per-user Git sync configuration
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                provider:
                  type: string
                  enum: [github, forgejo]
                repo:
                  type: string
                  example: "username/my-notes"
                token:
                  type: string
                  description: Access token (PAT)
                branch:
                  type: string
                  default: main
                api_base:
                  type: string
                  description: API base URL (Forgejo only)
                author_name:
                  type: string
                author_email:
                  type: string
      responses:
        '200':
          description: Configuration saved
        '403':
          description: Git sync is not enabled

  # ==================
  # Export Endpoints (Legacy - File Downloads)
  # ==================
  # These legacy endpoints live at the application root, not under /api/v1
  # (hence the per-path "servers" override below).
  /api_export_note.php:
    servers:
      - url: /
    get:
      tags: [Export]
      summary: Export a note
      description: Download a note in various formats (HTML, Markdown, PDF, DOCX)
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: id
          in: query
          required: true
          schema:
            type: integer
        - name: format
          in: query
          schema:
            type: string
            enum: [html, markdown, md, pdf, docx]
            default: html
      responses:
        '200':
          description: File download

  /api_export_folder.php:
    servers:
      - url: /
    get:
      tags: [Export]
      summary: Export a folder as ZIP
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: folder_id
          in: query
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: ZIP file download

  /api_export_entries.php:
    servers:
      - url: /
    get:
      tags: [Export]
      summary: Export all entries as ZIP
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: workspace
          in: query
          schema:
            type: string
      responses:
        '200':
          description: ZIP file download

  /api_export_structured.php:
    servers:
      - url: /
    get:
      tags: [Export]
      summary: Export structured data
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: workspace
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Structured export download

  /api_export_attachments.php:
    servers:
      - url: /
    get:
      tags: [Export]
      summary: Export all attachments as ZIP
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
      responses:
        '200':
          description: ZIP file download

  /api_download_note.php:
    servers:
      - url: /
    get:
      tags: [Export]
      summary: Download note file
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: id
          in: query
          required: true
          schema:
            type: integer
        - name: type
          in: query
          schema:
            type: string
            enum: [note, markdown, tasklist, excalidraw]
      responses:
        '200':
          description: File download

  /api_save_excalidraw.php:
    servers:
      - url: /
    post:
      tags: [Export]
      summary: Save Excalidraw diagram
      description: Save or update an Excalidraw drawing
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                note_id:
                  type: integer
                workspace:
                  type: string
                heading:
                  type: string
                diagram_data:
                  type: string
                preview_image:
                  type: string
                  format: binary
      responses:
        '200':
          description: Diagram saved

  # ==================
  # User Management Endpoints
  # ==================
  /users/profiles:
    get:
      tags: [Users]
      summary: Get available user profiles (public)
      description: |
        Returns a list of active user profiles for login/selection purposes.
        This endpoint does NOT require authentication and is used by the login page.
        Does NOT require X-User-ID header.
      security: []
      responses:
        '200':
          description: List of active user profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      example: 1
                    username:
                      type: string
                      example: "admin"

  /users/me:
    get:
      tags: [Users]
      summary: Get current authenticated user's profile
      description: Does NOT require X-User-ID header.
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  username:
                    type: string
                  is_admin:
                    type: boolean

  /users/me/password:
    post:
      tags: [Users]
      summary: Change current user's password
      description: Does NOT require X-User-ID header.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, new_password, confirm_password]
              properties:
                current_password:
                  type: string
                new_password:
                  type: string
                  minLength: 4
                confirm_password:
                  type: string
      responses:
        '200':
          description: Password changed
        '400':
          description: Missing fields or passwords do not match
        '401':
          description: Current password is incorrect

  /users/me/password-status:
    get:
      tags: [Users]
      summary: Get current user's password status
      description: |
        Indicates whether the current user has a custom password or is using the .env fallback.
        Does NOT require X-User-ID header.
      responses:
        '200':
          description: Password status

  /users/lookup/{username}:
    get:
      tags: [Users]
      summary: Get user ID by username (admin only)
      description: |
        Converts a username to a user ID. Accessible to administrators only.
        Does NOT require X-User-ID header (since the purpose is to find the ID).
        Used by backup scripts to resolve usernames to IDs.
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
          description: Username to lookup
          example: "Nina"
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    example: 9
                  username:
                    type: string
                    example: "Nina"
        '404':
          description: User not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "User not found"

  /admin/users:
    get:
      tags: [Users]
      summary: List all user profiles (admin only)
      description: |
        Get detailed list of all user profiles with storage statistics.
        Requires admin privileges. Does NOT require X-User-ID header.
      responses:
        '200':
          description: List of users with statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        username:
                          type: string
                        is_admin:
                          type: boolean
                        active:
                          type: boolean
                        created_at:
                          type: string
                          format: date-time
                        last_login:
                          type: string
                          format: date-time
                          nullable: true
                        storage_bytes:
                          type: integer
                        notes_count:
                          type: integer
                        attachments_count:
                          type: integer
                  total:
                    type: integer
        '403':
          description: Admin access required
    post:
      tags: [Users]
      summary: Create a new user profile (admin only)
      description: |
        Create a new user profile. Requires admin privileges.
        Does NOT require X-User-ID header.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
              properties:
                username:
                  type: string
                  example: "newuser"
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  message:
                    type: string
        '400':
          description: Invalid request or username already exists
        '403':
          description: Admin access required

  /admin/users/{id}:
    get:
      tags: [Users]
      summary: Get a specific user profile (admin only)
      description: |
        Get detailed information about a specific user including storage statistics.
        Requires admin privileges. Does NOT require X-User-ID header.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: User profile details
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  username:
                    type: string
                  is_admin:
                    type: boolean
                  active:
                    type: boolean
                  created_at:
                    type: string
                    format: date-time
                  last_login:
                    type: string
                    format: date-time
                    nullable: true
                  storage:
                    type: object
                    properties:
                      total:
                        type: integer
                      database:
                        type: integer
                      entries:
                        type: integer
                      attachments:
                        type: integer
                  notes_count:
                    type: integer
                  attachments_count:
                    type: integer
        '404':
          description: User not found
        '403':
          description: Admin access required
    patch:
      tags: [Users]
      summary: Update a user profile (admin only)
      description: |
        Update user profile properties (username, active status, admin status).
        Requires admin privileges. Does NOT require X-User-ID header.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  example: "newusername"
                active:
                  type: boolean
                is_admin:
                  type: boolean
      responses:
        '200':
          description: User updated successfully
        '400':
          description: Invalid request
        '403':
          description: Admin access required
        '404':
          description: User not found
    delete:
      tags: [Users]
      summary: Delete a user profile (admin only)
      description: |
        Delete a user profile. Optionally delete all user data.
        Cannot delete your own profile or the last admin.
        Requires admin privileges. Does NOT require X-User-ID header.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: delete_data
          in: query
          schema:
            type: boolean
            default: false
          description: If true, also delete all user data (notes, attachments, etc.)
      responses:
        '200':
          description: User deleted successfully
        '400':
          description: Cannot delete own profile or last admin
        '403':
          description: Admin access required
        '404':
          description: User not found

  /admin/users/{id}/reset-password:
    post:
      tags: [Users]
      summary: Reset or set a user's password (admin only)
      description: |
        Reset a user's password to the default or set a custom one.
        Requires admin privileges. Does NOT require X-User-ID header.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  type: string
                  enum: [reset_to_default, set_password]
                  default: reset_to_default
                new_password:
                  type: string
                  minLength: 4
                  description: Required when action is set_password
      responses:
        '200':
          description: Password reset or updated
        '400':
          description: Invalid action or password too short
        '403':
          description: Admin access required
        '404':
          description: User not found

  /admin/users/{id}/password-status:
    get:
      tags: [Users]
      summary: Get a user's password status (admin only)
      description: |
        Indicates whether the user has a custom password or is using the .env fallback.
        Requires admin privileges. Does NOT require X-User-ID header.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Password status
        '403':
          description: Admin access required
        '404':
          description: User not found

  /admin/stats:
    get:
      tags: [Users]
      summary: Get system statistics (admin only)
      description: |
        Get aggregated statistics for all users (total storage, notes count, etc.).
        Requires admin privileges. Does NOT require X-User-ID header.
      responses:
        '200':
          description: System statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_users:
                    type: integer
                  active_users:
                    type: integer
                  admin_users:
                    type: integer
                  total_storage_bytes:
                    type: integer
                  total_storage_mb:
                    type: number
                  total_notes:
                    type: integer
                  total_attachments:
                    type: integer
        '403':
          description: Admin access required

  /admin/repair:
    post:
      tags: [Users]
      summary: Repair master database (admin only)
      description: |
        Scan user data directories and rebuild the master database registry.
        This includes rebuilding shared links and discovering orphaned users.
        Requires admin privileges. Does NOT require X-User-ID header.
      responses:
        '200':
          description: Repair completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  stats:
                    type: object
                    properties:
                      users_scanned:
                        type: integer
                      users_added:
                        type: integer
                      links_rebuilt:
                        type: integer
                      errors:
                        type: array
                        items:
                          type: string
        '403':
          description: Admin access required

  # ==================
  # Public Tasks Endpoints (token-based, no Basic Auth)
  # ==================
  /public/tasks:
    post:
      tags: [Public Tasks]
      summary: Add a task to a shared task list
      description: Authenticated with the public share token instead of credentials
      security: []
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
          description: Public share token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
                  description: Task text
      responses:
        '200':
          description: Task added
        '403':
          description: Invalid token or share not writable

  /public/tasks/{id}:
    patch:
      tags: [Public Tasks]
      summary: Update a task on a shared note
      description: Authenticated with the public share token instead of credentials
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Task index in the list
        - name: token
          in: query
          required: true
          schema:
            type: string
          description: Public share token
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                completed:
                  type: boolean
                text:
                  type: string
      responses:
        '200':
          description: Task updated
        '403':
          description: Invalid token or share not writable
    delete:
      tags: [Public Tasks]
      summary: Delete a task from a shared task list
      description: Authenticated with the public share token instead of credentials
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Task index in the list
        - name: token
          in: query
          required: true
          schema:
            type: string
          description: Public share token
      responses:
        '200':
          description: Task deleted
        '403':
          description: Invalid token or share not writable
