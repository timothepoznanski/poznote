openapi: 3.0.3
info:
  title: Poznote REST API
  version: 2.0.0

servers:
  - url: /api/v1
    description: REST API v1

tags:
  - name: Notes
    description: Notes CRUD operations, locks and utilities
  - name: Snapshots
    description: Note snapshots (daily versions)
  - name: Reminders
    description: Note reminders and notifications
  - name: Folders
    description: Folders management
  - name: Trash
    description: Trash management
  - name: Workspaces
    description: Workspaces management
  - name: Tags
    description: Tags listing
  - name: Attachments
    description: File attachments
  - name: Share
    description: Note and folder sharing
  - name: Settings
    description: Application settings
  - name: Backups
    description: Backup and restore
  - name: System
    description: System information and utilities
  - name: Git Sync
    description: Git synchronization (GitHub / Forgejo)
  - name: Users
    description: User profiles management
  - name: Public Tasks
    description: Tasks on publicly shared notes (token-based)
  - name: Export
    description: Export operations (legacy endpoints)

security:
  - BasicAuth: []
  - BearerAuth: []
  - SessionAuth: []

components:
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
      description: HTTP Basic Auth with global username/password. Include X-User-ID header for data endpoints.
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: OIDC Bearer JWT when OIDC is enabled, or the internal MCP Bearer token. For data endpoints, X-User-ID is optional for the OIDC token-linked profile and required for the internal service token.
    SessionAuth:
      type: apiKey
      in: cookie
      name: POZNOTE_SESSION_8040
  
  parameters:
    UserIdHeader:
      name: X-User-ID
      in: header
      required: true
      schema:
        type: integer
      description: User profile ID to access. Required for Basic Auth and internal service-token data requests. OIDC Bearer JWT requests default to the token-linked profile when omitted. Account-access grants from the web UI do not allow non-admin API credentials to target another profile; use admin credentials or the internal service token for cross-profile API access. Use GET /users/profiles to list available profiles.

  schemas:
    Note:
      type: object
      properties:
        id:
          type: integer
          example: 123
        heading:
          type: string
          example: "My Note Title"
        entrycontent:
          type: string
          example: "# Hello World\n\nThis is my note content."
        tags:
          type: string
          example: "work,important"
        folder:
          type: string
          nullable: true
          example: "Projects"
        workspace:
          type: string
          example: "Personal"
        favorite:
          type: integer
          enum: [0, 1]
        trash:
          type: integer
          enum: [0, 1]
        type:
          type: string
          enum: [note, markdown, tasklist, excalidraw]
        created:
          type: string
          format: date-time
        updated:
          type: string
          format: date-time

    Folder:
      type: object
      properties:
        id:
          type: integer
          example: 12
        name:
          type: string
          example: "Projects"
        workspace:
          type: string
          example: "Personal"
        parent_id:
          type: integer
          nullable: true
        icon:
          type: string
          nullable: true
          example: "lucide-folder"

    Workspace:
      type: object
      properties:
        name:
          type: string
          example: "Personal"
        note_count:
          type: integer
          example: 42

    Attachment:
      type: object
      properties:
        id:
          type: integer
          example: 1
        note_id:
          type: integer
          example: 123
        filename:
          type: string
          example: "document.pdf"
        original_filename:
          type: string
          example: "My Document.pdf"
        mime_type:
          type: string
          example: "application/pdf"
        size:
          type: integer
          example: 102400
        uploaded_at:
          type: string
          format: date-time

    Backup:
      type: object
      properties:
        filename:
          type: string
          example: "poznote_backup_2025-01-05_12-00-00.zip"
        size:
          type: integer
          example: 1975805
        size_mb:
          type: number
          example: 1.88
        created_at:
          type: string
          format: date-time
        download_url:
          type: string
          example: "/api/v1/backups/poznote_backup_2025-01-05_12-00-00.zip"

    ShareInfo:
      type: object
      properties:
        is_shared:
          type: boolean
        token:
          type: string
          nullable: true
        url:
          type: string
          nullable: true
        theme:
          type: string
          enum: [light, dark, black]
        indexable:
          type: boolean
        has_password:
          type: boolean
        access_mode:
          type: string
          enum: [read_only, check_only, full]
        allowed_users:
          type: array
          nullable: true
          items:
            type: integer

    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
          example: "Error message"

    Success:
      type: object
      properties:
        success:
          type: boolean
          example: true

paths:
  # ==================
  # Notes Endpoints
  # ==================
  /notes:
    get:
      tags: [Notes]
      summary: List notes
      description: Get list of notes with optional filters
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: workspace
          in: query
          schema:
            type: string
          description: Filter by workspace name
        - name: folder
          in: query
          schema:
            type: string
          description: Filter by folder name
        - name: folder_id
          in: query
          schema:
            type: integer
          description: Filter by folder ID
        - name: search
          in: query
          schema:
            type: string
          description: Search in note content
        - name: created_from
          in: query
          schema:
            type: string
            format: date
          description: Filter notes created on or after this date
        - name: created_to
          in: query
          schema:
            type: string
            format: date
          description: Filter notes created on or before this date
        - name: favorite
          in: query
          schema:
            type: integer
            enum: [0, 1]
          description: Filter favorites only
        - name: sort
          in: query
          schema:
            type: string
            enum: [updated_desc, created_desc, heading_asc]
          description: Sort order
        - name: get_folders
          in: query
          schema:
            type: boolean
          description: Include folder information
      responses:
        '200':
          description: List of notes
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  notes:
                    type: array
                    items:
                      $ref: '#/components/schemas/Note'
    post:
      tags: [Notes]
      summary: Create a new note
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                heading:
                  type: string
                  example: "New Note"
                content:
                  type: string
                  example: "Note content here"
                entry:
                  type: string
                  description: Alternative field for content
                workspace:
                  type: string
                  example: "Personal"
                folder_id:
                  type: integer
                  nullable: true
                  description: ID of the folder (optional)
                  example: 12
                folder:
                  type: string
                  description: Target folder name (alternative to folder_id)
                type:
                  type: string
                  enum: [note, markdown, tasklist]
                  default: note
                tags:
                  type: string
                  example: "tag1,tag2"
      responses:
        '201':
          description: Note created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  id:
                    type: integer
                  message:
                    type: string

  /notes/resolve:
    get:
      tags: [Notes]
      summary: Resolve a note reference
      description: Find a note by title or ID within a workspace
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: reference
          in: query
          required: true
          schema:
            type: string
          description: Note title or ID
        - name: workspace
          in: query
          required: true
          schema:
            type: string
          description: Workspace to search in
      responses:
        '200':
          description: Note found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  note:
                    $ref: '#/components/schemas/Note'

  /notes/search:
    get:
      tags: [Notes]
      summary: Search notes
      description: Search notes by heading or content
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query
        - name: workspace
          in: query
          schema:
            type: string
          description: Restrict search to a workspace
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
          description: Maximum number of results
        - name: created_from
          in: query
          schema:
            type: string
            format: date
          description: Filter notes created on or after this date
        - name: created_to
          in: query
          schema:
            type: string
            format: date
          description: Filter notes created on or before this date
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  notes:
                    type: array
                    items:
                      $ref: '#/components/schemas/Note'

  /notes/with-attachments:
    get:
      tags: [Notes]
      summary: List notes with attachments
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: workspace
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of notes that have attachments

  /notes/{id}:
    get:
      tags: [Notes]
      summary: Get a specific note
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Note details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  note:
                    $ref: '#/components/schemas/Note'
        '404':
          description: Note not found
    patch:
      tags: [Notes]
      summary: Update a note
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                heading:
                  type: string
                content:
                  type: string
                tags:
                  type: string
                folder_id:
                  type: integer
                  nullable: true
                  description: ID of the folder (optional)
      responses:
        '200':
          description: Note updated
    delete:
      tags: [Notes]
      summary: Delete a note (move to trash)
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: permanent
          in: query
          schema:
            type: boolean
            default: false
          description: Permanently delete instead of moving to trash
      responses:
        '200':
          description: Note deleted

  /notes/{id}/restore:
    post:
      tags: [Notes]
      summary: Restore a note from trash
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Note restored

  /notes/{id}/tags:
    put:
      tags: [Notes]
      summary: Update note tags
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  type: string
                  example: "tag1,tag2,tag3"
      responses:
        '200':
          description: Tags updated

  /notes/{id}/favorite:
    post:
      tags: [Notes]
      summary: Toggle favorite status
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Favorite status toggled
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  favorite:
                    type: integer
                    enum: [0, 1]

  /notes/{id}/duplicate:
    post:
      tags: [Notes]
      summary: Duplicate a note
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '201':
          description: Note duplicated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  new_note_id:
                    type: integer

  /notes/{id}/folder:
    post:
      tags: [Notes]
      summary: Move note to a folder
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                folder_id:
                  type: integer
                  nullable: true
                  description: Target folder ID (0 or null moves to root)
                folder:
                  type: string
                  description: Target folder name (alternative to folder_id)
                workspace:
                  type: string
      responses:
        '200':
          description: Note moved

  /notes/{id}/remove-folder:
    post:
      tags: [Notes]
      summary: Remove note from folder (move to root)
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Note moved to root

  /notes/{id}/beacon:
    post:
      tags: [Notes]
      summary: Emergency save via sendBeacon
      description: Used for saving note content when page is closing
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                content:
                  type: string
                heading:
                  type: string
      responses:
        '200':
          description: Note saved

  /notes/{id}/backlinks:
    get:
      tags: [Notes]
      summary: Get backlinks for a note
      description: List all notes that link to this note (HTML links, URL parameters, and wiki-link syntax `[[Note Title]]`)
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: List of backlinks

  /notes/{id}/icon:
    put:
      tags: [Notes]
      summary: Update note icon
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                icon:
                  type: string
                  example: "lucide-file-text"
                  description: Icon class name (empty string resets to default)
                icon_color:
                  type: string
                  example: "#ff9800"
                  description: Icon color (empty string resets)
      responses:
        '200':
          description: Icon updated

  /notes/{id}/create-template:
    post:
      tags: [Notes]
      summary: Create a template from a note
      description: Copies the note into the "Templates" folder of its workspace (created if missing)
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '201':
          description: Template created

  /notes/{id}/convert:
    post:
      tags: [Notes]
      summary: Convert note type (Markdown <-> HTML)
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [target]
              properties:
                target:
                  type: string
                  enum: [html, markdown]
                  description: Target format
      responses:
        '200':
          description: Note converted
        '400':
          description: Invalid or unsupported conversion

  /notes/{id}/lock:
    get:
      tags: [Notes]
      summary: Get note edit lock status
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Current lock status
    post:
      tags: [Notes]
      summary: Acquire an exclusive edit lock
      description: The editor session can also be sent via the X-Editor-Session-ID header
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [editor_session_id]
              properties:
                editor_session_id:
                  type: string
                  description: Unique ID of the editing session
      responses:
        '200':
          description: Lock acquired
        '409':
          description: Note is locked by another session

  /notes/{id}/lock/heartbeat:
    post:
      tags: [Notes]
      summary: Refresh an existing note edit lock
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [editor_session_id]
              properties:
                editor_session_id:
                  type: string
      responses:
        '200':
          description: Lock refreshed
        '409':
          description: Note is locked by another session

  /notes/{id}/lock/release:
    post:
      tags: [Notes]
      summary: Release a note edit lock
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [editor_session_id]
              properties:
                editor_session_id:
                  type: string
      responses:
        '200':
          description: Lock released (or was not held)

  # ==================
  # Snapshots Endpoints
  # ==================
  /notes/{id}/snapshot:
    post:
      tags: [Snapshots]
      summary: Create a snapshot for a note
      description: Without parameters, creates/updates today's automatic snapshot (one per day)
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: manual
          in: query
          schema:
            type: integer
            enum: [0, 1]
          description: If 1, create an additional manual snapshot (alias `force`)
      responses:
        '200':
          description: Snapshot created
    get:
      tags: [Snapshots]
      summary: Get a snapshot for a note
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: snapshot_key
          in: query
          schema:
            type: string
          description: Snapshot key from the list endpoint
        - name: date
          in: query
          schema:
            type: string
            format: date
          description: Snapshot date (defaults to today)
      responses:
        '200':
          description: Snapshot content
        '404':
          description: Snapshot not found

  /notes/{id}/snapshots:
    get:
      tags: [Snapshots]
      summary: List available snapshots for a note
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: List of snapshots

  /notes/{id}/snapshot/restore:
    post:
      tags: [Snapshots]
      summary: Restore a note to a snapshot state
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: snapshot_key
          in: query
          schema:
            type: string
          description: Snapshot key from the list endpoint
        - name: date
          in: query
          schema:
            type: string
            format: date
          description: Snapshot date (defaults to today)
      responses:
        '200':
          description: Note restored to snapshot state
        '404':
          description: Snapshot not found

  # ==================
  # Reminders Endpoints
  # ==================
  /notes/{id}/reminder:
    get:
      tags: [Reminders]
      summary: Get reminder for a note
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Reminder details
    post:
      tags: [Reminders]
      summary: Set a reminder on a note
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reminder_at]
              properties:
                reminder_at:
                  type: string
                  format: date-time
                  description: When to trigger the reminder (ISO 8601)
                message:
                  type: string
                  description: Optional reminder message
                email_enabled:
                  type: boolean
                  description: Also send an email (if email is configured)
      responses:
        '200':
          description: Reminder set
    delete:
      tags: [Reminders]
      summary: Remove a reminder from a note
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Reminder removed

  /reminders:
    get:
      tags: [Reminders]
      summary: List triggered notifications
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: workspace
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Notifications with unread/total counts

  /reminders/count:
    get:
      tags: [Reminders]
      summary: Get unread notification count (lightweight polling)
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: workspace
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Notification counters

  /reminders/dismiss-all:
    post:
      tags: [Reminders]
      summary: Dismiss all notifications
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
      responses:
        '200':
          description: All notifications dismissed

  /reminders/{id}/read:
    post:
      tags: [Reminders]
      summary: Mark a notification as read
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Notification marked as read

  /reminders/{id}/dismiss:
    post:
      tags: [Reminders]
      summary: Dismiss a notification
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Notification dismissed

  # ==================
  # Share Endpoints
  # ==================
  /notes/{id}/share:
    get:
      tags: [Share]
      summary: Get share status
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Share status
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  share:
                    $ref: '#/components/schemas/ShareInfo'
    post:
      tags: [Share]
      summary: Create or renew share link
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                theme:
                  type: string
                  enum: [light, dark, black]
                indexable:
                  type: boolean
                password:
                  type: string
                custom_token:
                  type: string
                  description: Custom URL token (slug)
                access_mode:
                  type: string
                  enum: [read_only, check_only, full]
                  description: Access mode (tasklist notes only)
      responses:
        '200':
          description: Share link created
    patch:
      tags: [Share]
      summary: Update share settings
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                indexable:
                  type: boolean
                password:
                  type: string
                  nullable: true
                  description: New password (empty to remove)
                custom_token:
                  type: string
                access_mode:
                  type: string
                  enum: [read_only, check_only, full]
                  description: Access mode (tasklist notes only)
                allowed_users:
                  type: array
                  nullable: true
                  items:
                    type: integer
                  description: User IDs with access
      responses:
        '200':
          description: Share settings updated
    delete:
      tags: [Share]
      summary: Revoke share link
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Share link revoked

  /shared:
    get:
      tags: [Share]
