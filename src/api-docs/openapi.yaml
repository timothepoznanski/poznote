  # ==================
  # Attachments Endpoints
  # ==================
  /notes/{noteId}/attachments:
    get:
      tags: [Attachments]
      summary: List attachments for a note
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: noteId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: List of attachments
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  attachments:
                    type: array
                    items:
                      $ref: '#/components/schemas/Attachment'
    post:
      tags: [Attachments]
      summary: Upload an attachment
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: noteId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Attachment uploaded

  /notes/{noteId}/attachments/{attachmentId}:
    get:
      tags: [Attachments]
      summary: Download an attachment
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: noteId
          in: path
          required: true
          schema:
            type: integer
        - name: attachmentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: File download
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
    delete:
      tags: [Attachments]
      summary: Delete an attachment
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: noteId
          in: path
          required: true
          schema:
            type: integer
        - name: attachmentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Attachment deleted

  # ==================
  # Folders Endpoints
  # ==================
  /folders:
    get:
      tags: [Folders]
      summary: List all folders
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: workspace
          in: query
          schema:
            type: string
        - name: tree
          in: query
          schema:
            type: boolean
          description: Return as nested tree structure
      responses:
        '200':
          description: List of folders
    post:
      tags: [Folders]
      summary: Create a new folder
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [name, workspace]
              properties:
                name:
                  type: string
                workspace:
                  type: string
                parent_id:
                  type: integer
                  nullable: true
      responses:
        '201':
          description: Folder created

  /folders/counts:
    get:
      tags: [Folders]
      summary: Get note counts for all folders
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: workspace
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Folder counts

  /folders/suggested:
    get:
      tags: [Folders]
      summary: Get suggested folders
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: workspace
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Suggested folders

  /folders/move-files:
    post:
      tags: [Folders]
      summary: Move all files from one folder to another
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [source_folder_id, target_folder_id]
              properties:
                source_folder_id:
                  type: integer
                  description: Source folder ID
                target_folder_id:
                  type: integer
                  description: Target folder ID (0 moves notes to root)
                workspace:
                  type: string
                  description: Workspace context
      responses:
        '200':
          description: Files moved

  /folders/reorder:
    post:
      tags: [Folders]
      summary: Reorder a folder before/after a sibling
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [folder_id, target_folder_id, position]
              properties:
                folder_id:
                  type: integer
                  description: Folder to move
                target_folder_id:
                  type: integer
                  description: Sibling folder used as anchor
                position:
                  type: string
                  enum: [before, after]
                workspace:
                  type: string
                  description: Workspace check (must match target folder)
      responses:
        '200':
          description: Folder reordered
        '400':
          description: Invalid parameters or folders in different workspaces
        '409':
          description: Move would create a cycle

  /folders/kanban-structure:
    post:
      tags: [Folders]
      summary: Create a Kanban board folder structure
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [folder_name, columns]
              properties:
                folder_name:
                  type: string
                  description: Name of the Kanban board folder
                columns:
                  type: integer
                  minimum: 1
                  maximum: 9
                  description: Number of columns
                workspace:
                  type: string
                parent_folder_id:
                  type: integer
                  nullable: true
                  description: Create inside this parent folder
                language:
                  type: string
                  default: en
                  description: Language for default column names
      responses:
        '201':
          description: Kanban structure created

  /folders/{id}:
    get:
      tags: [Folders]
      summary: Get a specific folder
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Folder details
    patch:
      tags: [Folders]
      summary: Rename a folder
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
      responses:
        '200':
          description: Folder renamed
    delete:
      tags: [Folders]
      summary: Delete a folder
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: delete_contents
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Folder deleted

  /folders/{id}/move:
    post:
      tags: [Folders]
      summary: Move folder and its contents
      description: |
        Moves a folder to a new parent folder or to a different workspace.
        This operation is **recursive**: all subfolders and notes within the folder will be moved to the target workspace.
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                parent_id:
                  type: integer
                  nullable: true
                  description: ID of the new parent folder. Use `null` to move to the root level.
                target_workspace:
                  type: string
                  nullable: true
                  description: Name of the target workspace. If omitted, the folder remains in its current workspace.
      responses:
        '200':
          description: Folder and all its contents moved successfully
        '400':
          description: Invalid request (e.g., target parent is in a different workspace)
        '404':
          description: Folder or target workspace not found
        '409':
          description: Conflict (e.g., folder with same name exists or move would create a cycle)

  /folders/{id}/empty:
    post:
      tags: [Folders]
      summary: Empty folder (move notes to trash)
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Folder emptied

  /folders/{id}/icon:
    put:
      tags: [Folders]
      summary: Update folder icon
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                icon:
                  type: string
                  example: "lucide-folder-open"
      responses:
        '200':
          description: Icon updated

  /folders/{id}/notes:
    get:
      tags: [Folders]
      summary: Get note count in folder
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Note count

  /folders/{id}/path:
    get:
      tags: [Folders]
      summary: Get folder path
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Folder path

  # ==================
