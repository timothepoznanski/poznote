; Rootless variant global php-fpm config.
;
; The stock /usr/local/etc/php-fpm.conf defaults its [global] error_log to
; log/php-fpm.log (i.e. /usr/local/var/log/php-fpm.log). That path is owned
; by root in the base image; when the master process is not root it cannot
; open the file and FPM refuses to start ("failed to open error_log ...
; Permission denied"). Redirecting to stderr avoids needing extra writable
; directories, and keeps FPM's own log visible via `docker logs` /
; supervisord's stderr capture, consistent with the other supervised
; programs in this image.
[global]
error_log = /dev/stderr
daemonize = no

include=/usr/local/etc/php-fpm.d/*.conf
