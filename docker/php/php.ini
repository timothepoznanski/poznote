error_reporting = E_ERROR | E_PARSE
display_errors = Off
log_errors = On
error_log = /var/log/php_errors.log

upload_max_filesize = 750M
post_max_size = 800M
max_file_uploads = 20
max_input_time = 600
max_execution_time = 600
memory_limit = 512M

; Temporary file settings
upload_tmp_dir = /tmp
file_uploads = On

; Security enhancements
expose_php = Off

; OPcache: keep compiled scripts in shared memory instead of re-parsing
; every PHP file on every request.
; validate_timestamps stays on so the dev bind-mount (docker-compose-dev.yml)
; still picks up source edits; revalidation is at most one stat() per 2s.
opcache.enable = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 4000
opcache.validate_timestamps = 1
opcache.revalidate_freq = 2
