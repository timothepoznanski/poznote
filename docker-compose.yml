# Poznote Docker Compose Configuration
# 
# IMPORTANT: When updating Poznote, always follow instruction here https://github.com/timothepoznanski/poznote#update-application

services:
  webserver:
    image: ghcr.io/timothepoznanski/poznote:6
    restart: always
    env_file: .env
    environment:
      SQLITE_DATABASE: /var/www/html/data/database/poznote.db
    ports:
      - "${HTTP_WEB_PORT}:80"
    volumes:
      - "./data:/var/www/html/data"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--timeout=5", "-O", "/dev/null", "http://127.0.0.1/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  mcp-server:
    image: ghcr.io/timothepoznanski/poznote-mcp:6
    container_name: poznote-mcp
    restart: always
    environment:
      POZNOTE_API_URL: http://webserver:80/api/v1
      POZNOTE_DEBUG: ${POZNOTE_DEBUG:-false}
    ports:
      - "127.0.0.1:${POZNOTE_MCP_PORT:-8045}:8045"
    volumes:
      - "./data:/var/www/html/data:ro"
    depends_on:
      - webserver
