<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Poznote URL Saver</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 10px;
      width: 350px;
    }

    h2 {
      margin: 0 0 12px 0;
      font-size: 16px;
    }

    label {
      display: block;
      margin-top: 10px;
    }

    input,
    select {
      width: 100%;
      padding: 5px;
      margin-top: 5px;
      box-sizing: border-box;
    }

    button {
      margin-top: 15px;
      width: 100%;
      padding: 10px;
      background: #007cba;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 4px;
    }

    button:hover {
      background: #005a87;
    }

    button:disabled {
      background: #aaa;
      cursor: not-allowed;
      opacity: 0.6;
    }

    .action-buttons {
      display: flex;
      gap: 5px;
      margin-top: 10px;
    }

    .action-buttons button {
      margin-top: 0;
      flex: 1;
      font-size: 13px;
      padding: 10px 5px;
    }

    #status {
      margin-top: 10px;
      color: red;
      word-wrap: break-word;
      font-size: 12px;
    }

    .row {
      display: flex;
      gap: 5px;
      align-items: center;
    }

    #fetchWorkspaces,
    #loadFolders {
      width: auto;
      margin-top: 5px;
      padding: 5px 10px;
      font-size: 12px;
      flex-shrink: 0;
    }

    /* Collapsible config panel */
    .config-toggle {
      background: none;
      border: 1px solid #ccc;
      color: #444;
      font-size: 12px;
      padding: 6px 10px;
      margin-top: 10px;
      width: 100%;
      text-align: left;
      cursor: pointer;
      border-radius: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .config-toggle:hover {
      background: #f0f0f0;
    }

    .config-toggle .arrow {
      transition: transform 0.2s;
      font-style: normal;
    }

    .config-toggle.open .arrow {
      transform: rotate(180deg);
    }

    .config-panel {
      display: none;
      border: 1px solid #ddd;
      border-top: none;
      padding: 10px;
      border-radius: 0 0 4px 4px;
      background: #fafafa;
    }

    .config-panel.open {
      display: block;
    }

    .config-panel label {
      font-size: 12px;
    }

    #saveConfig {
      margin-top: 12px;
      padding: 8px;
      font-size: 13px;
    }
  </style>
</head>

<body>
  <h2>Poznote URL Saver</h2>

  <div class="action-buttons">
    <button id="saveNote" title="Save URL only" disabled>🔗 Save URL</button>
    <button id="saveScreenshot" title="Save with screenshot" disabled>📸 Screenshot</button>
  </div>

  <button class="config-toggle" id="configToggle">
    ⚙️ Configuration <span class="arrow">▼</span>
  </button>

  <div class="config-panel" id="configPanel">
    <label>App URL (e.g. https://your-server/)</label>
    <input type="url" id="appUrl" placeholder="https://your-server/">

    <label>Username</label>
    <input type="text" id="username">

    <label>Password</label>
    <input type="password" id="password">

    <label>Workspace</label>
    <div class="row">
      <select id="workspaceSelect">
        <option value="Poznote">Poznote (Default)</option>
      </select>
      <button id="fetchWorkspaces" title="Fetch Workspaces">↻</button>
    </div>

    <label>Folder (optional)</label>
    <div class="row">
      <select id="folderSelect"></select>
      <button id="loadFolders" title="Load Folders">↻</button>
    </div>

    <button id="saveConfig">💾 Save Configuration</button>
  </div>

  <div id="status"></div>

  <script src="popup.js"></script>
</body>

</html>
